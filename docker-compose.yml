# Viscous Wiki — MediaWiki + MariaDB + R2 uploader + Cloudflare Tunnel
#
# Traffic flow:
#   Cloudflare edge --tunnel--> cloudflared --> caddy --> mediawiki  (viscous.wiki)
#                                                    \--> uploader   (viscous.wiki/upload)
#
# No host ports are published. cloudflared dials OUT to Cloudflare, so the VM
# has zero inbound ports open. Point the tunnel's public hostname (viscous.wiki)
# at  http://caddy:80  (Caddy path-routes between MediaWiki and the uploader).

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MW_DB_NAME:-mediawiki}
      MARIADB_USER: ${MW_DB_USER:-mediawiki}
      MARIADB_PASSWORD: ${MW_DB_PASSWORD:?set MW_DB_PASSWORD in .env}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  mediawiki:
    image: mediawiki:1.43
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mw-images:/var/www/html/images
      - ./mediawiki/LocalSettings.php:/var/www/html/LocalSettings.php:ro
      - ./mediawiki/LocalSettings.custom.php:/var/www/html/LocalSettings.custom.php:ro
      - ./mediawiki/shorturl.conf:/etc/apache2/conf-enabled/shorturl.conf:ro
      - ./skins/Citizen:/var/www/html/skins/Citizen:ro
      - ./skins/Fluent:/var/www/html/skins/Fluent:ro
    expose:
      - "80"

  uploader:
    build: ./uploader
    restart: unless-stopped
    depends_on:
      - mediawiki
    environment:
      PORT: 8080
      BASE_PATH: /upload
      # Auth is delegated to MediaWiki: the uploader forwards the visitor's
      # session cookie to MediaWiki's API and checks group membership.
      MEDIAWIKI_API_URL: ${MEDIAWIKI_API_URL:-http://mediawiki/api.php}
      UPLOAD_GROUP: ${UPLOAD_GROUP:-videouploader}
      # R2 (S3-compatible) storage:
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-viscous-media}
      R2_PUBLIC_BASE: ${R2_PUBLIC_BASE:-https://media.viscous.wiki}
      R2_QUOTA_BYTES: ${R2_QUOTA_BYTES:-10000000000}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5368709120}
    expose:
      - "8080"

  discord-bot:
    build: ./discord-bot
    restart: unless-stopped
    environment:
      PORT: 8080
      BASE_PATH: /discord
      DATA_DIR: /data
      # Discord Developer Portal > your app > Bot > token.
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      # Optional: pin a specific server; otherwise the bot's first guild is used.
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      # HTTP Basic auth for the channel-picker UI (placeholder auth for now).
      DISCORD_UI_USER: ${DISCORD_UI_USER:-admin}
      DISCORD_UI_PASSWORD: ${DISCORD_UI_PASSWORD:?set DISCORD_UI_PASSWORD in .env}
    volumes:
      - discord-data:/data
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - mediawiki
      - uploader
      - discord-bot
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    expose:
      - "80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    depends_on:
      - caddy
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  db-data:
  mw-images:
  discord-data:
